<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Chunk Not Found</title>
    <style>
        body {
            background: #4e4e4e url('https://minecraft.net');
            background-size: 64px;
            image-rendering: pixelated;
            color: #FFFFFF;
            font-family: 'Minecraft', 'Courier New', Courier, monospace;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 2px 2px #000;
        }
        h1 { font-size: 5rem; margin-bottom: 10px; }
        p { font-size: 1.5rem; margin-bottom: 30px; }
        .btn {
            background: #AAAAAA;
            border: 4px solid #000;
            border-top-color: #DDD;
            border-left-color: #DDD;
            color: #000;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.2s;
            text-shadow: none;
        }
        .btn:hover { background: #BBBBBB; border-color: #FFF #555 #555 #FFF; }
        .creeper { font-size: 100px; margin: 20px; }
    </style>
</head>
<body>
    <div class="creeper">🟩</div>
    <h1>404</h1>
    <p>Chunk Not Found! A Creeper might have blown up this link.</p>
    <a href="/" class="btn">BACK TO SPAWN</a>
</body>
</html>
