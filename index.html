<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagler Launcher - Red Edition</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(80, 0, 0, 0.85), rgba(20, 0, 0, 0.95)), 
                        url('https://wallpapersden.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #8b0000;
            overflow-x: hidden;
        }

        /* NETHER SPARK PARTICLES */
        .spark {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #ff4d4d;
            box-shadow: 0 0 10px #ff0000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: rise 4s linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) scale(1); opacity: 1; }
            100% { transform: translateY(-10vh) scale(0.2); opacity: 0; }
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin-top: 40px; position: relative; z-index: 2; }
        
        .card { 
            background: rgba(40, 10, 10, 0.9); 
            backdrop-filter: blur(12px);
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 50, 50, 0.2); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.8); 
            display: flex;
            flex-direction: column;
        }

        h2 { color: #ff4d4d; margin-top: 0; font-size: 18px; border-bottom: 1px solid #551111; padding-bottom: 10px; text-transform: uppercase; }
        .input-style { width: 100%; padding: 10px; background: #3d1a1a; color: #fff; border: 1px solid #5e2a2a; border-radius: 4px; margin: 10px 0; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        
        .btn-play { background: #ff3333; color: white; margin-bottom: 8px; }
        .btn-play:hover { background: #cc0000; transform: translateY(-2px); }
        
        .btn-onsite { background: #ffffff; color: #8b0000; border: 1px solid #ff3333; }
        .btn-onsite:hover { background: #eeeeee; transform: translateY(-2px); }

        .btn-paths { background: #ffa500; color: black; margin-top: 10px; font-size: 12px; }
        .btn-server-help { background: #58a6ff; color: white; margin-top: 10px; font-size: 12px; }

        .btn-market { background: #444; color: white; font-size: 13px; padding: 8px 12px; }
        
        .server-item { background: rgba(0,0,0,0.3); padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 4px solid #ff3333; }
        code { display: block; background: #000; padding: 5px; font-size: 11px; color: #ff9999; margin-top: 5px; border-radius: 3px; overflow-x: auto; }
        
        .footer { margin-top: 50px; text-align: center; z-index: 2; padding-bottom: 20px; }
        .author { font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 1px; margin-bottom: 5px; }
        .credits { font-size: 11px; color: rgba(255,255,255,0.4); font-style: italic; }
    </style>
</head>
<body>

<h1 style="text-shadow: 2px 4px 15px rgba(0,0,0,1); color: #fff; font-size: 3rem; margin-top: 20px; z-index: 2;">EAGLER LAUNCHER</h1>

<div class="grid">
    <!-- LAUNCHER -->
    <div class="card">
        <h2>Launch Client</h2>
        <select id="clientSelect" class="input-style">
            <optgroup label="TuffBeta (1.21 Items)">
                <option value="TuffBeta-JS" data-path="tuffbeta_js.html">TuffBeta JS (1.21)</option>
                <option value="TuffBeta-WASM" data-path="tuffbeta_wasm.html">TuffBeta WASM</option>
            </optgroup>
            <optgroup label="Modpacks & Forge">
                <option value="1.6.4" data-path="Modpack1.6.4.html">Eagler Modpack 1.6.4</option>
                <option value="EaglerForge" data-path="eaglerforge_1.8.8.html">EaglerForge 1.8.8</option>
            </optgroup>
            <optgroup label="Core Versions">
                <option value="1.12.2" data-path="1.12.2.html">Eaglercraft 1.12.2</option>
                <option value="1.8.8" data-path="1.8.8.html">EaglercraftX 1.8.8</option>
            </optgroup>
        </select>
        
        <button class="btn btn-play" onclick="dlClient()">DOWNLOAD CLIENT</button>
        <button class="btn btn-onsite" onclick="playOnSite()">PLAY ON SITE</button>
        <button class="btn btn-paths" onclick="showAllPaths()">SHOW ALL FILE PATHS</button>
    </div>

    <!-- SERVER LIST -->
    <div class="card">
        <h2>Multiplayer</h2>
        <div class="server-item"><strong>XenaMC</strong> <code>wss://xena.wtf</code></div>
        <div class="server-item"><strong>VoidsentMC</strong> <code>wss://mc.voidsent.net</code></div>
        <div class="server-item"><strong>DSSX</strong> <code>wss://dssx.us</code></div>
        
        <div style="flex-grow: 1;"></div>
        <button class="btn btn-server-help" onclick="triggerDownload('server.txt', 'server.txt')">HOW TO MAKE A SERVER</button>
    </div>

    <!-- MARKETPLACE -->
    <div class="card">
        <h2>Pack Market</h2>
        <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <strong>1.8 Full Dark GUI</strong>
            <button class="btn btn-market" onclick="triggerDownload('darkgui.zip', '1.8-FullDarkGui.zip')">ADD</button>
        </div>
        <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <strong>Cheerleader 16x</strong>
            <button class="btn btn-market" onclick="triggerDownload('cheerleader.zip', 'Cheerleader_16x.zip')">ADD</button>
        </div>

        <div style="margin-top: auto; padding-top: 10px; border-top: 1px solid #444; text-align: center;">
            <span style="font-size: 11px; color: #ff9999;">For Eagler mods go to</span><br> 
            <a href="https://github.io" target="_blank" style="color: #fff; font-size: 12px;">eaglerrinth.github.io</a>
        </div>
    </div>
</div>

<div class="footer">
    <div class="author">made by zaka13</div>
    <div class="credits">Credits: Peyton, Lax1dude, and others!</div>
</div>

<script>
    function createSparks() {
        for (let i = 0; i < 30; i++) {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = Math.random() * 100 + 'vw';
            spark.style.animationDelay = Math.random() * 5 + 's';
            spark.style.opacity = Math.random();
            document.body.appendChild(spark);
        }
    }
    createSparks();

    function showAllPaths() {
        const select = document.getElementById('clientSelect');
        const options = select.querySelectorAll('option');
        let pathList = "--- CLIENT PATHS ---\n";
        
        options.forEach(opt => {
            pathList += `${opt.text}: ./${opt.getAttribute('data-path')}\n`;
        });

        pathList += "\n--- RESOURCE PACK PATHS ---\n";
        pathList += "1.8 Full Dark GUI: ./darkgui.zip\n";
        pathList += "Cheerleader 16x: ./cheerleader.zip\n";
        
        pathList += "\n--- GUIDES ---\n";
        pathList += "How to Make a Server: ./server.txt\n";

        alert(pathList);
    }

    function dlClient() {
        const sel = document.getElementById('clientSelect');
        const opt = sel.options[sel.selectedIndex];
        const path = opt.getAttribute('data-path');
        triggerDownload(path, path);
    }

    function playOnSite() {
        const sel = document.getElementById('clientSelect');
        const opt = sel.options[sel.selectedIndex];
        const path = opt.getAttribute('data-path');
        window.location.href = path;
    }

    function triggerDownload(path, fileName) {
        const a = document.createElement('a');
        a.href = path;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
