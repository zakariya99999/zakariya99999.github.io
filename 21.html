<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        :root {
            --primary-blue: #0077ff;
            --dark-bg: #0a0e14;
            --card-bg: #161b22;
            --accent-glow: rgba(0, 119, 255, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            scroll-behavior: smooth;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(180deg, #001f3f 0%, var(--dark-bg) 100%);
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-blue);
            text-shadow: 0 0 20px var(--accent-glow);
            margin: 0;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            padding-bottom: 100px;
        }

        /* Launcher Section */
        .section-title {
            border-left: 5px solid var(--primary-blue);
            padding-left: 15px;
            margin: 40px 0 20px;
        }

        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: block;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:hover {
            border-color: var(--primary-blue);
            transform: translateY(-5px);
            box-shadow: 0 0 15px var(--accent-glow);
            background: #1c2128;
        }

        .btn span {
            display: block;
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 5px;
        }

        /* Server Section */
        .server-section {
            margin-top: 80px;
        }

        .server-card {
            background: var(--card-bg);
            margin-bottom: 25px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        .server-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Status Iframe Styling */
        .status-frame {
            width: 100%;
            height: 250px;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

<header>
    <h1>EAGLERCRAFT</h1>
    <p>Premium Blue Edition Launcher</p>
</header>

<div class="container">
    
    <h2 class="section-title">Select Client</h2>
    <div class="client-grid">
        <a href="1.6.4.html" class="btn">Version 1.6.4<span>Classic Eaglercraft</span></a>
        <a href="1.8.8.html" class="btn">Version 1.8.8<span>Combat Update</span></a>
        <a href="1.12.2.html" class="btn">Version 1.12.2<span>World of Color</span></a>
        <a href="#" class="btn">Custom Client<span>External Links</span></a>
    </div>

    <div class="server-section">
        <h2 class="section-title">Multiplayer Servers</h2>

        <!-- Server 1 -->
        <div class="server-card">
            <div class="server-header"><strong>xena.wtf</strong></div>
            <iframe class="status-frame" srcdoc='
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { font-family: sans-serif; background: transparent; color: white; margin: 0; padding: 20px; text-align: center; }
                        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; }
                        .online { background: #2ecc71; } .offline { background: #e74c3c; }
                        .motd { background: #000; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 14px; text-align: left; min-height: 40px; margin: 10px 0; border: 1px solid #444; }
                    </style>
                </head>
                <body>
                    <div id="status" class="status-badge">Checking...</div>
                    <div class="motd" id="motd">Loading MOTD...</div>
                    <div>Players: <span id="player-count">0</span> / <span id="player-max">0</span></div>
                    <script>
                        async function update() {
                            try {
                                const r = await fetch("https://api.mcstatus.io/v2/status/java/xena.wtf");
                                const d = await r.json();
                                document.getElementById("status").className = "status-badge " + (d.online ? "online" : "offline");
                                document.getElementById("status").textContent = d.online ? "ONLINE" : "OFFLINE";
                                if(d.online) {
                                    document.getElementById("motd").innerHTML = d.motd.html;
                                    document.getElementById("player-count").textContent = d.players.online;
                                    document.getElementById("player-max").textContent = d.players.max;
                                }
                            } catch(e) { document.getElementById("status").textContent = "ERROR"; }
                        }
                        update();
                    </script>
                </body>
                </html>
            '></iframe>
        </div>

        <!-- Server 2 -->
        <div class="server-card">
            <div class="server-header"><strong>mc.voidsent.net</strong></div>
            <iframe class="status-frame" srcdoc='
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        body { font-family: sans-serif; background: transparent; color: white; margin: 0; padding: 20px; text-align: center; }
                        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; }
                        .online { background: #2ecc71; } .offline { background: #e74c3c; }
                        .motd { background: #000; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 14px; text-align: left; min-height: 40px; margin: 10px 0; border: 1px solid #444; }
                    </style>
                </head>
                <body>
                    <div id="status" class="status-badge">Checking...</div>
                    <div class="motd" id="motd">Loading MOTD...</div>
                    <div>Players: <span id="player-count">0</span> / <span id="player-max">0</span></div>
                    <script>
                        async function update() {
                            try {
                                const r = await fetch("https://api.mcstatus.io/v2/status/java/play.voidsent.net");
                                const d = await r.json();
                                document.getElementById("status").className = "status-badge " + (d.online ? "online" : "offline");
                                document.getElementById("status").textContent = d.online ? "ONLINE" : "OFFLINE";
                                if(d.online) {
                                    document.getElementById("motd").innerHTML = d.motd.html;
                                    document.getElementById("player-count").textContent = d.players.online;
                                    document.getElementById("player-max").textContent = d.players.max;
                                }
                            } catch(e) { document.getElementById("status").textContent = "ERROR"; }
                        }
                        update();
                    </script>
                </body>
                </html>
            '></iframe>
        </div>

        <!-- Repeated for 5 sections as requested -->
        <div class="server-card"><div class="server-header"><strong>COMING SOON</strong></strong></div><iframe class="status-frame" srcdoc='SOON'></iframe></div>
        <div class="server-card"><div class="server-header"><strong>COMING SOON</strong></div><iframe class="status-frame" srcdoc='SOON'></iframe></div>
        <div class="server-card"><div class="server-header"><strong>COMING SOON</strong></div><iframe class="status-frame" srcdoc='SOON'></iframe></div>

    </div>
</div>

</body>
</html>
